# Disable UAS for SanDisk Portable SSD (USB ID 0781:55bb).
#
# These drives drop the link / hang under load when driven by the UAS driver,
# producing uninterruptible I/O waits and EIO on reads. The :u flag tells the
# kernel to ignore UAS for this device and fall back to the slower but stable
# usb-storage (BOT) driver.
#
# Install:
#   sudo cp disable-uas-sandisk.conf /etc/modprobe.d/
#   sudo update-initramfs -u        # bakes the option into the boot image
#   # then reboot, OR replug the drive after a full USB rescan
#
# Verify after reboot/replug:
#   readlink -f /sys/block/sda/device/../../../driver   # should end in usb-storage, not uas
#
# If hangs persist even on usb-storage, suspect the cable or the drive media,
# not the driver.
options usb-storage quirks=0781:55bb:u
